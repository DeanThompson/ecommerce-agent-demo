services:
  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
      args:
        NPM_REGISTRY: https://registry.npmmirror.com
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_PATH: /app/data/ecommerce.duckdb
      SESSIONS_DIR: /app/data/sessions
    volumes:
      - ./data/ecommerce.duckdb:/app/data/ecommerce.duckdb
      - ./data/sessions:/app/data/sessions
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"http=require('http');http.get('http://127.0.0.1:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
      args:
        NPM_REGISTRY: https://registry.npmmirror.com
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:?BASIC_AUTH_USER is required in .env}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:?BASIC_AUTH_PASSWORD is required in .env}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8081}:80"
    restart: unless-stopped
